version: '3.8'

services:
  roberta-sentiment-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=cardiffnlp/twitter-roberta-base-sentiment-latest
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=info
      - USE_CUDA=false  # Set to true if you have NVIDIA Docker support
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - roberta-sentiment-service
    restart: unless-stopped
    profiles:
      - production
