apiVersion: apps/v1
kind: Deployment
metadata:
  name: roberta-sentiment-ui
  namespace: roberta-sentiment
  labels:
    app: roberta-sentiment-ui
    version: v1.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roberta-sentiment-ui
  template:
    metadata:
      labels:
        app: roberta-sentiment-ui
        version: v1.0.0
    spec:
      containers:
      - name: ui
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        volumeMounts:
        - name: ui-files
          mountPath: /usr/share/nginx/html
        env:
        - name: API_URL
          value: "http://roberta-sentiment-service:8000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: ui-files
        configMap:
          name: roberta-sentiment-ui-files
---
apiVersion: v1
kind: Service
metadata:
  name: roberta-sentiment-ui
  namespace: roberta-sentiment
  labels:
    app: roberta-sentiment-ui
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: roberta-sentiment-ui


